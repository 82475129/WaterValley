<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>水之谷 Aqua Valley</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <nav class="navbar">
    <div class="logo">🌊 水之谷 Aqua Valley</div>
    <div class="nav-links">
      <a href="#home">首頁</a>
      <a href="#features">特色</a>
      <a href="#characters">角色</a>
      <a href="#monsters">怪物</a>
      <a href="#skills">技能</a>
      <a href="game/">遊戲</a>
    </div>
  </nav>

  <section id="home" class="hero-content">
    <h1 id="game-title">水之谷 Aqua Valley</h1>
    <p id="game-desc">載入中...</p>

    <div class="hero-buttons">
      <a class="primary-btn" href="game/">開始遊戲</a>
      <a class="secondary-btn" href="#characters">查看角色</a>
    </div>
  </section>
</header>

<main>
  <section id="features" class="section">
    <h2>遊戲特色</h2>
    <div id="features-list" class="cards"></div>
  </section>

  <section id="characters" class="section">
    <h2>角色介紹</h2>
    <div id="characters-list" class="cards"></div>
  </section>

  <section id="monsters" class="section">
    <h2>怪物圖鑑</h2>
    <div id="monsters-list" class="cards"></div>
  </section>

  <section id="skills" class="section">
    <h2>技能系統</h2>
    <div id="skills-list" class="cards"></div>
  </section>
</main>

<footer>
  <p>© 水之谷 Aqua Valley 原創 2D RPG</p>
</footer>

<script src="app.js"></script>
</body>
</html>
